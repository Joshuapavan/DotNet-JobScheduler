# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore DotNet-JobScheduler.sln
    
    - name: Build
      run: dotnet build DotNet-JobScheduler.sln --no-restore --configuration Release
    
    - name: Run Tests with Coverage
      run: |
        dotnet test DotNet-JobScheduler.sln --no-build --verbosity normal \
          --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./test-results \
          /p:CollectCoverage=true
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: test-results
        path: ./test-results/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: csharp
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225

  dependency-check:
    name: Check for Vulnerable Dependencies
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      
      - name: List Vulnerable Packages
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      
      - name: Check Code Format
        run: dotnet format DotNet-JobScheduler.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true

